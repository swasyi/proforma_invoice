<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; border: 1px solid #ddd; padding: 30px; border-radius: 12px; background-color: #ffffff;">
        <h2 style="color: #212529; font-size: 20px; border-bottom: 2px solid #ffc107; padding-bottom: 10px;">
            🔔 Price Request Update
        </h2>

        <!-- This shows the custom message (e.g., "Admin sujal added this remark...") -->
        <p style="font-size: 16px; font-weight: bold; color: #0d6efd;">
            {{ headline }}
        </p>

        <div style="background: #fdfdfd; border: 1px solid #eee; border-left: 5px solid #ffc107; padding: 20px; margin: 20px 0; border-radius: 4px;">
            <p style="margin: 0; color: #555; font-style: italic;">"{{ remark }}"</p>
            <p style="margin-top: 10px; font-size: 12px; color: #888;">— Added by {{ author.username }}</p>
        </div>

        <table style="width: 100%; margin-bottom: 25px;">
            <tr>
                <td style="font-size: 14px; color: #666;"><strong>Invoice ID:</strong></td>
                <td style="font-size: 14px; color: #212529;">#{{ invoice.id }}</td>
            </tr>
            <tr>
                <td style="font-size: 14px; color: #666;"><strong>Customer:</strong></td>
                <td style="font-size: 14px; color: #212529;">{{ invoice.customer.name }}</td>
            </tr>
        </table>

        <div style="text-align: center;">
            <!-- This link changes based on whether the receiver is Admin or SP -->
            <a href="{{ action_url }}" style="display: inline-block; padding: 12px 25px; background: #212529; color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: bold;">
                Open Dashboard to View / Reply
            </a>
        </div>

        <p style="font-size: 11px; color: #999; margin-top: 40px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            Automated notification from ObluTools.
        </p>
    </div>
</body>
</html>
