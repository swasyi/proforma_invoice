<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px;">
    <div style="max-width: 600px; margin: auto; border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

        <div style="background-color: #17a2b8; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; text-transform: uppercase;">New Remark Added</h2>
            <p style="margin: 5px 0 0 0;">Proforma Invoice #{{ invoice.id }}</p>
        </div>

        <div style="padding: 30px;">
            <p>Hello <strong>{{ user.username }}</strong>,</p>

            <p>The Admin has added a new note to your price change request for <strong>{{ invoice.customer.name }}</strong>.</p>

            <div style="background-color: #f8f9fa; border-left: 5px solid #17a2b8; padding: 15px; margin: 20px 0;">
                <strong style="color: #555; display: block; margin-bottom: 5px;">Latest Remark:</strong>
                <p style="margin: 0; font-style: italic; font-size: 1.1rem; color: #000;">"{{ remark }}"</p>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="{{ site_url }}{% url 'proforma_detail' invoice.id %}" style="background-color: #007bff; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
                    View Proforma
                </a>
            </div>
        </div>

        <div style="background-color: #f1f1f1; padding: 15px; text-align: center; font-size: 12px; color: #777;">
            <p style="margin: 0;">Automated notification from Oblu Tools.</p>
        </div>
    </div>
</body>
</html>
